# =============================================================================
# Mylegacycannabis.ca — CI/CD Pipeline
# =============================================================================
# Triggers on every PR to main and every push to main.
# Runs: Type Check → Lint/Format → Unit Tests → Build → Security Audit
# Optional: E2E tests (Playwright) — gated behind a manual trigger for now.
#
# Author: k6subramaniam
# Date:   2026-04-11
# =============================================================================

name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same PR/branch to save runner minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.4.1"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # STAGE 1: Install dependencies (cached) — all other jobs depend on this
  # ─────────────────────────────────────────────────────────────────────────
  install:
    name: 📦 Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}

  # ─────────────────────────────────────────────────────────────────────────
  # STAGE 2a: TypeScript Type Checking
  # ─────────────────────────────────────────────────────────────────────────
  typecheck:
    name: 🔍 TypeScript Check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Run tsc --noEmit
        run: pnpm run check

  # ─────────────────────────────────────────────────────────────────────────
  # STAGE 2b: Code Formatting Check (Prettier)
  # ─────────────────────────────────────────────────────────────────────────
  format:
    name: 🎨 Prettier Check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Check formatting
        run: npx prettier --check "client/src/**/*.{ts,tsx}" "server/**/*.ts" "shared/**/*.ts"

  # ─────────────────────────────────────────────────────────────────────────
  # STAGE 2c: Unit Tests (Vitest)
  # ─────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Run Vitest
        run: pnpm run test -- --reporter=verbose
      # Optional: Upload coverage
      # - name: Upload coverage
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: coverage-report
      #     path: coverage/

  # ─────────────────────────────────────────────────────────────────────────
  # STAGE 2d: Security Audit — Dependency Vulnerabilities
  # ─────────────────────────────────────────────────────────────────────────
  security-audit:
    name: 🔒 Security Audit
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: pnpm audit (production deps)
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true # Warn but don't block (set to false when ready)
      - name: Check for known vulnerable patterns
        run: |
          echo "=== Checking for publicProcedure on admin routes ==="
          if grep -rn 'publicProcedure' server/routers.ts | grep -i 'admin'; then
            echo "::error::CRITICAL: Found publicProcedure on admin-prefixed routes!"
            exit 1
          else
            echo "✅ No admin routes using publicProcedure"
          fi
          echo ""
          echo "=== Checking for hardcoded secrets ==="
          if grep -rn 'SMTP_PASS\s*=' server/ --include='*.ts' | grep -v 'process.env' | grep -v '.test.'; then
            echo "::error::Potential hardcoded SMTP credential found"
            exit 1
          else
            echo "✅ No hardcoded secrets detected"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # STAGE 3: Production Build (Vite + esbuild)
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Production Build
    needs: [typecheck, format, unit-tests, security-audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Build client (Vite) + server (esbuild)
        run: pnpm run build
      - name: Verify build artifacts
        run: |
          test -f dist/index.js && echo "✅ Server bundle exists" || (echo "❌ Missing dist/index.js" && exit 1)
          test -d dist/public && echo "✅ Client bundle exists" || (echo "❌ Missing dist/public/" && exit 1)

  # ─────────────────────────────────────────────────────────────────────────
  # STAGE 4: Docker Build Verification
  # ─────────────────────────────────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t mylegacycannabis:ci-${{ github.sha }} .
      - name: Verify container starts
        run: |
          docker run -d --name mlc-test \
            -e NODE_ENV=production \
            -e DATABASE_URL=postgresql://test:test@localhost:5432/test \
            -p 3000:3000 \
            mylegacycannabis:ci-${{ github.sha }} || true
          sleep 5
          docker logs mlc-test 2>&1 | head -50
          docker stop mlc-test || true
          docker rm mlc-test || true

