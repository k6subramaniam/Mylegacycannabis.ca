    <!-- Critical inline CSS: reserve header + main space before React loads to prevent CLS -->
    <style>
      /* Prevent FOUC while React loads */
      body {
        background: #fff;
        margin: 0;
      }
      /* Reserve space for the hero section before React hydrates */
      #root {
        min-height: 100vh;
      }
      /* Stable aspect-ratio container for hero image — prevents CLS during image load */
      .hero-img-wrap {
        aspect-ratio: 1440 / 600;
        max-height: 600px;
      }
      /* Font display: swap avoids invisible text during font load */
      @font-face {
        font-family: "Bungee";
        font-display: swap;
      }
      @font-face {
        font-family: "Roboto";
        font-display: swap;
      }
      /* Reserve fixed header height to prevent CLS when React mounts */
      .mlc-header-placeholder {
        height: 96px;
      }
      @media (min-width: 768px) {
        .mlc-header-placeholder {
          height: 112px;
        }
      }
      /* ── Shop product grid skeleton: reserves CLS-safe space ── */
      .product-grid-skeleton {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 1.5rem;
      }
      .product-card-skeleton {
        height: 360px;
        border-radius: 0.75rem;
        background: linear-gradient(
          110deg,
          #f0f0f0 8%,
          #e8e8e8 18%,
          #f0f0f0 33%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer {
        to {
          background-position-x: -200%;
        }
      }
    </style>
