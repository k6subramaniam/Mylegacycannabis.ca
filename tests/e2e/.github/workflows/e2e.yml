# ═══════════════════════════════════════════════════════════════
# My Legacy Cannabis — Playwright E2E Test CI/CD
# Runs on every PR and push to main
# ═══════════════════════════════════════════════════════════════

name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Manual trigger for on-demand testing
  workflow_dispatch:
    inputs:
      test_url:
        description: 'URL to test against'
        required: false
        default: 'https://mylegacycannabisca-production.up.railway.app'
      test_filter:
        description: 'Test filter (e.g., @smoke, @critical, @admin)'
        required: false
        default: ''

# Cancel in-progress runs for the same PR
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── SMOKE TESTS (fast, run first) ───
  smoke:
    name: 🔥 Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests against production
        run: npx playwright test --project=production-smoke
        env:
          TEST_BASE_URL: ${{ github.event.inputs.test_url || 'https://mylegacycannabisca-production.up.railway.app' }}

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 7

  # ─── FULL E2E SUITE ───
  e2e:
    name: 🧪 Full E2E Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: smoke  # Only run if smoke passes
    strategy:
      fail-fast: false
      matrix:
        project: [chrome, mobile]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests (${{ matrix.project }})
        run: |
          FILTER="${{ github.event.inputs.test_filter }}"
          if [ -n "$FILTER" ]; then
            npx playwright test --project=${{ matrix.project }} --grep "$FILTER"
          else
            npx playwright test --project=${{ matrix.project }}
          fi
        env:
          TEST_BASE_URL: ${{ github.event.inputs.test_url || 'https://mylegacycannabisca-production.up.railway.app' }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_OTP: ${{ secrets.TEST_USER_OTP }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_OTP: ${{ secrets.TEST_ADMIN_OTP }}
          TEST_OTP_BYPASS: 'false'

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: traces-${{ matrix.project }}
          path: test-results/
          retention-days: 7

  # ─── REPORT SUMMARY ───
  report:
    name: 📊 Test Report
    runs-on: ubuntu-latest
    needs: [smoke, e2e]
    if: always()
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports/

      - name: Summarize results
        run: |
          echo "## 🧪 E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke | ${{ needs.smoke.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Chrome E2E | ${{ needs.e2e.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📎 Download HTML reports from the Artifacts tab above." >> $GITHUB_STEP_SUMMARY
